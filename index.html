<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>バーコードダンジョン</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- マップ画面 -->
  <div id="screen-map" class="screen active">
    <div id="map"></div>
    <div class="map-hud">
      <div class="hud-title">⚔️ バーコードダンジョン</div>
      <div class="hud-button-row">
        <button id="btn-scan" class="btn-primary">📷 スキャン</button>
        <button id="btn-menu" class="btn-secondary">🎒 メニュー</button>
      </div>
    </div>
  </div>

  <!-- スキャン画面 -->
  <div id="screen-scanner" class="screen">
    <div class="scanner-header">
      <button id="btn-back-scan" class="btn-back">← 戻る</button>
      <span>バーコードをスキャン</span>
    </div>
    <div id="scanner-wrap">
      <video id="scanner-video" autoplay muted playsinline></video>
      <div class="scanner-frame">
        <div class="scanner-line"></div>
      </div>
      <div class="scanner-hint">バーコードをフレームに合わせてください</div>
    </div>
    <div id="scan-result" class="hidden">
      <div id="item-result"></div>
      <button id="btn-keep-item" class="btn-primary">受け取る</button>
      <button id="btn-rescan" class="btn-back" style="margin-top:6px">もう一度スキャン</button>
    </div>
  </div>

  <!-- ダンジョン画面（戦闘も同画面にインライン化） -->
  <div id="screen-dungeon" class="screen">
    <div class="dungeon-header">
      <div>
        <div id="dungeon-title">ダンジョン</div>
        <div id="floor-label">B1F</div>
      </div>
      <div class="dungeon-right-hud">
        <div class="dungeon-hp-row">
          <span id="player-lv" class="lv-text">Lv1</span>
          <span id="player-hp" class="hp-text">HP: 35/35</span>
        </div>
        <div id="equip-display" class="equip-display">⚔️ー　🛡️ー</div>
      </div>
      <button id="btn-dungeon-menu" class="btn-icon-menu" title="メニュー">🎒</button>
    </div>
    <canvas id="dungeon-canvas"></canvas>

    <!-- 探索中フッター：D-pad（8方向）+ 探索ログ -->
    <div class="dungeon-footer" id="dungeon-footer">
      <div id="dungeon-log"></div>
      <div class="dpad">
        <div class="dpad-row">
          <button class="dpad-btn dpad-diag" data-dir="up-left">↖</button>
          <button class="dpad-btn" data-dir="up">↑</button>
          <button class="dpad-btn dpad-diag" data-dir="up-right">↗</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" data-dir="left">←</button>
          <button class="dpad-btn dpad-wait" data-dir="wait">待</button>
          <button class="dpad-btn" data-dir="right">→</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn dpad-diag" data-dir="down-left">↙</button>
          <button class="dpad-btn" data-dir="down">↓</button>
          <button class="dpad-btn dpad-diag" data-dir="down-right">↘</button>
        </div>
      </div>
    </div>

    <!-- 戦闘中パネル：敵情報・自HP・ログ・行動ボタン -->
    <div class="combat-panel hidden" id="combat-panel">
      <div class="combat-enemy">
        <div class="combat-enemy-row">
          <span id="enemy-sprite" class="enemy-sprite-mini">❓</span>
          <div class="combat-enemy-text">
            <div id="enemy-name" class="combat-enemy-name">???</div>
            <div class="enemy-meta">
              <span id="enemy-rarity">[コモン]</span>
              <span id="enemy-element">火属性</span>
            </div>
          </div>
        </div>
        <div class="hp-bar-wrap"><div id="enemy-hp-bar" class="hp-bar" style="width:100%"></div></div>
        <div id="enemy-stat-text"></div>
      </div>

      <div class="combat-player">
        <div class="combat-player-row">
          <span>🧙 自分</span>
          <span id="battle-player-hp">HP 35/35</span>
        </div>
        <div class="hp-bar-wrap"><div id="battle-player-hp-bar" class="hp-bar" style="width:100%"></div></div>
      </div>

      <div id="battle-log" class="battle-log"></div>
      <div class="battle-buttons">
        <button class="btn-battle" id="btn-attack">⚔️ こうげき</button>
        <button class="btn-battle" id="btn-skill">✨ スキル</button>
        <button class="btn-battle" id="btn-item">🎒 アイテム</button>
        <button class="btn-battle" id="btn-run">🏃 にげる</button>
      </div>
    </div>

    <!-- アイテム選択モーダル -->
    <div id="item-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title">アイテムを使う</div>
        <div id="item-list"></div>
        <button id="btn-item-cancel" class="btn-back">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 汎用アクション確認モーダル（装備・使用などの誤タップ防止） -->
  <div id="action-confirm-modal" class="confirm-modal hidden">
    <div class="confirm-modal-box">
      <div id="confirm-title" class="confirm-modal-title"></div>
      <div id="confirm-detail" class="confirm-modal-detail"></div>
      <div class="confirm-modal-actions">
        <button id="btn-confirm-cancel" class="btn-back">キャンセル</button>
        <button id="btn-confirm-ok"     class="btn-primary">確定</button>
      </div>
    </div>
  </div>

  <!-- ダンジョン入場前確認モーダル -->
  <div id="pre-dungeon-modal" class="pre-dungeon-modal hidden">
    <div class="pre-dungeon-box">
      <div class="pre-dungeon-title">🚪 潜入確認</div>

      <section class="pre-dungeon-section">
        <div class="pre-dungeon-section-title">ダンジョン</div>
        <div id="pre-dungeon-info"></div>
      </section>

      <section class="pre-dungeon-section">
        <div class="pre-dungeon-section-title">プレイヤーの状態</div>
        <div id="pre-dungeon-player"></div>
      </section>

      <div class="pre-dungeon-actions">
        <button id="btn-pre-menu"    class="btn-secondary">🎒 メニュー</button>
        <button id="btn-pre-cancel"  class="btn-back">戻る</button>
        <button id="btn-pre-confirm" class="btn-primary">潜入する</button>
      </div>
    </div>
  </div>

  <!-- メニューモーダル（マップ・ダンジョンの両方から開く。screen 非依存に body 直下） -->
  <div id="menu-modal" class="menu-modal hidden">
    <div class="menu-modal-header">
      <button id="btn-menu-close" class="btn-back">← 閉じる</button>
      <span class="menu-modal-title">メニュー</span>
    </div>
    <div class="menu-modal-body">
      <section class="menu-section">
        <div class="menu-section-title">🧙 ステータス</div>
        <div class="menu-stats">
          <div>Lv <span id="menu-lv">1</span></div>
          <div>HP <span id="menu-hp">35/35</span></div>
          <div>ATK <span id="menu-atk">9</span></div>
          <div>DEF <span id="menu-def">3</span></div>
        </div>
        <div class="menu-xp-section">
          <div class="menu-xp-text">XP <span id="menu-xp-current">0</span> / <span id="menu-xp-next">20</span></div>
          <div class="menu-xp-bar-wrap"><div id="menu-xp-bar" class="menu-xp-bar"></div></div>
        </div>
      </section>
      <section class="menu-section">
        <div class="menu-section-title">装備中</div>
        <div id="menu-equipment"></div>
      </section>
      <section class="menu-section">
        <div class="menu-section-title">持ち物 <span id="menu-inv-count" class="menu-section-meta"></span></div>
        <div id="menu-inventory"></div>
      </section>
    </div>

    <!-- 装備交換モーダル（メニューに重ねるサブモーダル） -->
    <div id="swap-modal" class="swap-modal hidden">
      <div class="swap-modal-box">
        <div class="swap-modal-title">装備を交換</div>
        <div class="swap-modal-current">
          <div class="swap-modal-label">現在装備中</div>
          <div id="swap-current"></div>
        </div>
        <div class="swap-modal-arrow">↕</div>
        <div class="swap-modal-candidates">
          <div class="swap-modal-label">交換候補</div>
          <div id="swap-candidates"></div>
        </div>
        <div class="swap-modal-actions">
          <button id="btn-swap-unequip" class="btn-back">外して持ち物に</button>
          <button id="btn-swap-cancel"  class="btn-back">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen">
    <div class="result-box">
      <div id="result-icon"></div>
      <div id="result-title"></div>
      <div id="result-body"></div>
      <button id="btn-result-back" class="btn-primary">マップに戻る</button>
    </div>
  </div>

  <!-- デバッグパネル（?debug=1 で表示） -->
  <div id="debug-panel" class="debug-panel hidden">
    <div class="debug-panel-header">
      <span>🛠<span class="debug-panel-label"> DEBUG</span></span>
      <button id="debug-toggle" class="debug-mini-btn" title="折り畳み">−</button>
    </div>
    <div id="debug-panel-body" class="debug-panel-body">
      <fieldset class="debug-section">
        <legend>📷 モックスキャン</legend>
        <input id="debug-scan-text" type="text" placeholder="バーコード文字列 (8〜13桁)" value="4901234567890" />
        <select id="debug-scan-format">
          <option value="EAN_13">EAN_13 / JAN-13</option>
          <option value="EAN_8">EAN_8 / JAN-8</option>
          <option value="UPC_A">UPC_A</option>
          <option value="CODE_128">CODE_128（レシート系）</option>
          <option value="ITF">ITF（書籍系）</option>
        </select>
        <button id="debug-mock-scan" class="debug-action">スキャン実行</button>
      </fieldset>

      <fieldset class="debug-section">
        <legend>📍 モックGPS</legend>
        <div class="debug-row">
          <input id="debug-gps-lat" type="number" step="0.0001" placeholder="lat"   value="35.6762" />
          <input id="debug-gps-lng" type="number" step="0.0001" placeholder="lng"   value="139.6503" />
        </div>
        <div class="debug-row">
          <button id="debug-set-gps"  class="debug-action">この座標に移動</button>
          <button id="debug-clear-gps" class="debug-action ghost">解除</button>
        </div>
        <div id="debug-gps-status" class="debug-meta">実GPSを使用中</div>
      </fieldset>

      <fieldset class="debug-section">
        <legend>⚙️ オプション</legend>
        <label class="debug-row">
          <input id="debug-bypass" type="checkbox" />
          <span>入場距離(80m)を無視</span>
        </label>
        <label class="debug-row">
          <input id="debug-disable-ai" type="checkbox" />
          <span>敵AIを停止</span>
        </label>
        <label class="debug-row">
          <input id="debug-reveal" type="checkbox" />
          <span>ダンジョン全可視化</span>
        </label>
        <label class="debug-row">
          <input id="debug-force-drop" type="checkbox" />
          <span>敵撃破で必ずドロップ</span>
        </label>
        <button id="debug-kill-adj" class="debug-action ghost">隣接敵を撃破(ドロップ判定込)</button>
      </fieldset>

      <fieldset class="debug-section">
        <legend>📈 レベル</legend>
        <div class="debug-row">
          <button id="debug-lv-up"    class="debug-action">Lv +1</button>
          <button id="debug-lv-max"   class="debug-action">Lv 100</button>
        </div>
        <button id="debug-lv-reset" class="debug-action ghost">Lv 1 にリセット</button>
      </fieldset>

      <fieldset class="debug-section">
        <legend>🎒 インベントリ操作</legend>
        <div class="debug-row">
          <button id="debug-add-weapon" class="debug-action">⚔️武器</button>
          <button id="debug-add-armor"  class="debug-action">🛡️防具</button>
        </div>
        <div class="debug-row">
          <button id="debug-add-potion" class="debug-action">🧪薬</button>
          <button id="debug-add-scroll" class="debug-action">📜巻物</button>
        </div>
        <button id="debug-clear-inv" class="debug-action ghost">全廃棄(装備も)</button>
      </fieldset>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
