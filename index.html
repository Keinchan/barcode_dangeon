<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>バーコードダンジョン</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- マップ画面 -->
  <div id="screen-map" class="screen active">
    <div id="map"></div>
    <div class="map-hud">
      <div class="hud-title">⚔️ バーコードダンジョン</div>
      <button id="btn-scan" class="btn-primary">📷 バーコードをスキャン</button>
    </div>
  </div>

  <!-- スキャン画面 -->
  <div id="screen-scanner" class="screen">
    <div class="scanner-header">
      <button id="btn-back-scan" class="btn-back">← 戻る</button>
      <span>バーコードをスキャン</span>
    </div>
    <div id="scanner-wrap">
      <video id="scanner-video" autoplay muted playsinline></video>
      <div class="scanner-frame">
        <div class="scanner-line"></div>
      </div>
      <div class="scanner-hint">バーコードをフレームに合わせてください</div>
    </div>
    <div id="scan-result" class="hidden">
      <div id="item-result"></div>
      <button id="btn-keep-item" class="btn-primary">受け取る</button>
      <button id="btn-rescan" class="btn-back" style="margin-top:6px">もう一度スキャン</button>
    </div>
  </div>

  <!-- ダンジョン画面（戦闘も同画面にインライン化） -->
  <div id="screen-dungeon" class="screen">
    <div class="dungeon-header">
      <div>
        <div id="dungeon-title">ダンジョン</div>
        <div id="floor-label">B1F</div>
      </div>
      <div class="dungeon-right-hud">
        <div id="player-hp" class="hp-text">HP: 35/35</div>
        <div id="equip-display" class="equip-display">⚔️ー　🛡️ー</div>
      </div>
    </div>
    <canvas id="dungeon-canvas"></canvas>

    <!-- 探索中フッター：D-pad + 探索ログ -->
    <div class="dungeon-footer" id="dungeon-footer">
      <div id="dungeon-log"></div>
      <div class="dpad">
        <button class="dpad-btn" data-dir="up">↑</button>
        <div class="dpad-row">
          <button class="dpad-btn" data-dir="left">←</button>
          <button class="dpad-btn dpad-wait" data-dir="wait">待</button>
          <button class="dpad-btn" data-dir="right">→</button>
        </div>
        <button class="dpad-btn" data-dir="down">↓</button>
      </div>
    </div>

    <!-- 戦闘中パネル：敵情報・自HP・ログ・行動ボタン -->
    <div class="combat-panel hidden" id="combat-panel">
      <div class="combat-enemy">
        <div class="combat-enemy-row">
          <span id="enemy-sprite" class="enemy-sprite-mini">❓</span>
          <div class="combat-enemy-text">
            <div id="enemy-name" class="combat-enemy-name">???</div>
            <div class="enemy-meta">
              <span id="enemy-rarity">[コモン]</span>
              <span id="enemy-element">火属性</span>
            </div>
          </div>
        </div>
        <div class="hp-bar-wrap"><div id="enemy-hp-bar" class="hp-bar" style="width:100%"></div></div>
        <div id="enemy-stat-text"></div>
      </div>

      <div class="combat-player">
        <div class="combat-player-row">
          <span>🧙 自分</span>
          <span id="battle-player-hp">HP 35/35</span>
        </div>
        <div class="hp-bar-wrap"><div id="battle-player-hp-bar" class="hp-bar" style="width:100%"></div></div>
      </div>

      <div id="battle-log" class="battle-log"></div>
      <div class="battle-buttons">
        <button class="btn-battle" id="btn-attack">⚔️ こうげき</button>
        <button class="btn-battle" id="btn-skill">✨ スキル</button>
        <button class="btn-battle" id="btn-item">🎒 アイテム</button>
        <button class="btn-battle" id="btn-run">🏃 にげる</button>
      </div>
    </div>

    <!-- アイテム選択モーダル -->
    <div id="item-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title">アイテムを使う</div>
        <div id="item-list"></div>
        <button id="btn-item-cancel" class="btn-back">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen">
    <div class="result-box">
      <div id="result-icon"></div>
      <div id="result-title"></div>
      <div id="result-body"></div>
      <button id="btn-result-back" class="btn-primary">マップに戻る</button>
    </div>
  </div>

  <!-- デバッグパネル（?debug=1 で表示） -->
  <div id="debug-panel" class="debug-panel hidden">
    <div class="debug-panel-header">
      <span>🛠 DEBUG</span>
      <button id="debug-toggle" class="debug-mini-btn" title="折り畳み">−</button>
    </div>
    <div id="debug-panel-body" class="debug-panel-body">
      <fieldset class="debug-section">
        <legend>📷 モックスキャン</legend>
        <input id="debug-scan-text" type="text" placeholder="バーコード文字列 (8〜13桁)" value="4901234567890" />
        <select id="debug-scan-format">
          <option value="EAN_13">EAN_13 / JAN-13</option>
          <option value="EAN_8">EAN_8 / JAN-8</option>
          <option value="UPC_A">UPC_A</option>
          <option value="CODE_128">CODE_128（レシート系）</option>
          <option value="ITF">ITF（書籍系）</option>
        </select>
        <button id="debug-mock-scan" class="debug-action">スキャン実行</button>
      </fieldset>

      <fieldset class="debug-section">
        <legend>📍 モックGPS</legend>
        <div class="debug-row">
          <input id="debug-gps-lat" type="number" step="0.0001" placeholder="lat"   value="35.6762" />
          <input id="debug-gps-lng" type="number" step="0.0001" placeholder="lng"   value="139.6503" />
        </div>
        <div class="debug-row">
          <button id="debug-set-gps"  class="debug-action">この座標に移動</button>
          <button id="debug-clear-gps" class="debug-action ghost">解除</button>
        </div>
        <div id="debug-gps-status" class="debug-meta">実GPSを使用中</div>
      </fieldset>

      <fieldset class="debug-section">
        <legend>⚙️ オプション</legend>
        <label class="debug-row">
          <input id="debug-bypass" type="checkbox" />
          <span>入場距離(80m)を無視</span>
        </label>
      </fieldset>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
